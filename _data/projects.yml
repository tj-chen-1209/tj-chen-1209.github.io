- id: libero-rdt
  title: "RDT Fine-tuning on LIBERO"
  subtitle: "Language-conditioned manipulation (Full FT vs LoRA)"
  period: "2025"
  role: "Lead implementer (data → training → evaluation)"
  keywords: ["Imitation Learning", "Diffusion Policy", "LIBERO", "DeepSpeed", "LoRA"]
  one_liner: "Built an end-to-end supervised fine-tuning pipeline for Robotics Diffusion Transformer (RDT) on LIBERO (HDF5 parsing, SigLIP-style vision preprocessing, T5-XXL embedding caching, DeepSpeed training, and automated checkpoint evaluation), and quantified key tradeoffs (Full FT 76–94% vs LoRA ~20%)."
  highlights:
    - "Implemented LIBERO HDF5 → RDT input pipeline (state/action remapping, SigLIP-style image preprocessing, augmentation)"
    - "Added T5-XXL language embedding caching to avoid repeated encoding (~30% training speedup)"
    - "Systematic comparison: Full fine-tuning reaches 76–94% (suite-dependent) while LoRA saturates around ~20%"
  outcome: "Identified practical bottlenecks and levers: inference dominates evaluation time (~375 ms/step, ~69%), and diffusion steps (H) + action chunk length (N) significantly affect success rate."
  page: "/projects/libero-rdt/"
  links:
    code: "https://github.com/tj-chen-1209/Libero_RDT"
    video: ""
    report: ""

- id: rlinf-rdt
  title: "RDT Integration into RLinf"
  subtitle: "Diffusion policy as an RL-compatible agent (BC eval ready)"
  period: "2026"
  role: "Core implementer (model + env interface + evaluation)"
  keywords: ["Reinforcement Learning", "Diffusion Policy", "RLinf", "LIBERO"]
  one_liner: "Integrated a diffusion-based manipulation policy (RDT) into the RLinf framework by aligning observations (including joint proprioception), implementing DDPM action-chunk sampling and LIBERO action extraction, and enabling checkpoint-based evaluation; PPO-style RL fine-tuning is in progress due to diffusion log-probability requirements."
  highlights:
    - "Wrapped RDT as an RLinf policy with DDPM-based action generation and action-space extraction for LIBERO execution"
    - "Extended LIBERO env + RLinf I/O to include 9-DoF joint proprioception required by RDT (arm + gripper)"
    - "Identified the key RL blocker: diffusion policies do not directly provide action log-probabilities required by PPO-style algorithms (implementation in progress)"
  outcome: "Evaluation pipeline works with pretrained/fine-tuned RDT checkpoints on LIBERO; PPO-style RL fine-tuning is under development due to diffusion log-probability challenges."
  page: "/projects/rlinf-rdt/"
